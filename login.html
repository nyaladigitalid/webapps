<!DOCTYPE html>

<html class="theme-openai" lang="id"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Nyala Digital Apps - Login</title>
<script src="js/include.js"></script>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        "primary": "#111827",
                        "secondary": "#6b7280",
                        "background-light": "#ffffff",
                        "background-soft": "#f7f7f5",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.5rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        html, body {
            height: 100%;
            overflow: hidden !important;
            scrollbar-width: none;
        }
        html::-webkit-scrollbar,
        body::-webkit-scrollbar {
            width: 0;
            height: 0;
        }
        html.theme-openai body > main {
            overflow: hidden !important;
            max-height: none !important;
            scrollbar-gutter: auto !important;
        }
        html.theme-openai body > main::-webkit-scrollbar {
            width: 0;
            height: 0;
        }
        body {
            font-family: 'Inter', sans-serif;
        }
        body {
            background: var(--oa-surface, #f7f7f5);
            color: var(--oa-text, #111827);
        }
        .oa-card {
            background: var(--oa-panel, #ffffff);
            border: 1px solid var(--oa-border, rgba(17, 24, 39, 0.10));
            box-shadow: 0 18px 45px rgba(0, 0, 0, 0.08);
        }
        .oa-muted {
            color: var(--oa-muted, #6b7280);
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center overflow-hidden">
<main class="relative z-10 w-full max-w-[480px] px-6 py-6 sm:py-10">
<div class="flex flex-col items-center mb-6 sm:mb-8">
<div class="flex items-center gap-3 mb-3">
<div class="p-1.5 rounded-2xl bg-white border border-slate-200 shadow-sm">
<img alt="Nyala Digital Logo" class="h-11 w-auto" src="img/logo.png"/>
</div>
<div class="space-y-0.5">
<h1 class="text-[22px] font-semibold tracking-tight text-slate-900 leading-tight">Nyala Digital Apps</h1>
<p class="text-[11px] uppercase tracking-[0.18em] text-slate-500 font-medium">Performance Marketing Suite</p>
</div>
</div>
<p class="oa-muted text-xs font-medium tracking-wide">Masuk untuk melanjutkan.</p>
</div>
<div class="oa-card rounded-2xl p-6 sm:p-8">
<div class="mb-6 sm:mb-8">
<h2 class="text-xl font-semibold text-slate-900 mb-1">Welcome back</h2>
<p class="oa-muted text-sm">Sign in to your account to continue.</p>
</div>
<form class="space-y-6">
<!-- Email Input -->
<div class="space-y-2">
<label class="text-xs font-semibold text-slate-700 ml-1 tracking-wide" for="email">Email / username / no HP</label>
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-slate-400 text-xl group-focus-within:text-slate-900 transition-colors">
                                person
                            </span>
</div>
<input class="block w-full bg-white border border-slate-200 rounded-xl py-3.5 pl-12 pr-4 text-sm text-slate-900 placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-black/10 focus:border-slate-300 transition-all duration-200" id="email" placeholder="email / nama / 08xxxxxxxxxx" type="text"/>
</div>
</div>
<!-- Password Input -->
<div class="space-y-2">
<div class="flex justify-between items-center ml-1">
<label class="text-xs font-semibold text-slate-700 tracking-wide" for="password">Password</label>
</div>
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-slate-400 text-xl group-focus-within:text-slate-900 transition-colors">
                                lock
                            </span>
</div>
<input class="block w-full bg-white border border-slate-200 rounded-xl py-3.5 pl-12 pr-12 text-sm text-slate-900 placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-black/10 focus:border-slate-300 transition-all duration-200" id="password" placeholder="••••••••" type="password"/>
<button class="absolute inset-y-0 right-0 pr-4 flex items-center text-slate-400 hover:text-slate-900 transition-colors" type="button">
<span class="material-symbols-outlined text-xl">
                                visibility
                            </span>
</button>
</div>
</div>
<div class="flex items-center justify-between">
<div class="flex items-center gap-2">
<input class="h-4 w-4 rounded border-slate-300 bg-white text-slate-900 focus:ring-black/10" id="remember-me" name="remember-me" type="checkbox"/>
<label class="ml-1 block text-[11px] oa-muted" for="remember-me">Ingat saya di perangkat ini</label>
</div>
<a class="text-[11px] font-semibold oa-muted hover:text-slate-900 transition-colors" href="#">Lupa password?</a>
</div>
<button class="bg-primary hover:bg-primary/90 w-full py-3.5 px-6 rounded-xl text-white font-semibold text-sm shadow-sm transform transition-all duration-150 active:scale-[0.98] focus:outline-none focus:ring-2 focus:ring-black/10 mt-3" type="submit">
Masuk ke dashboard
</button>
</form>
</div>
<p class="mt-6 sm:mt-8 text-center text-[12px] oa-muted">
Belum punya akun?
<a class="font-semibold text-slate-900 hover:underline transition-all underline-offset-4" href="#">Hubungi tim Nyala Digital</a>
</p>
<div class="mt-6 sm:mt-10 flex justify-center gap-6 text-[10px] text-slate-400 uppercase tracking-[0.22em] font-semibold">
<a class="hover:text-slate-900 transition-colors" href="#">Bantuan</a>
<a class="hover:text-slate-900 transition-colors" href="#">Privasi</a>
<a class="hover:text-slate-900 transition-colors" href="#">Syarat &amp; Ketentuan</a>
</div>
<p id="login-error" class="mt-4 text-xs text-red-400 bg-red-500/10 border border-red-500/30 rounded-xl px-3 py-2 hidden"></p>
</main>
<script>
    document.addEventListener("DOMContentLoaded", function () {
        var form = document.querySelector("form");
        var emailInput = document.getElementById("email");
        var passwordInput = document.getElementById("password");
        var rememberInput = document.getElementById("remember-me");
        var errorBox = document.getElementById("login-error");
        var passwordToggleButton = document.querySelector("#password + button");
        var submitButton = form ? form.querySelector('button[type="submit"]') : null;
        var passwordVisible = false;
        if (passwordToggleButton && passwordInput) {
            passwordToggleButton.addEventListener("click", function () {
                passwordVisible = !passwordVisible;
                passwordInput.type = passwordVisible ? "text" : "password";
            });
        }
        if (form && emailInput && passwordInput && submitButton) {
            console.log("Form and inputs found, adding listener");
            form.addEventListener("submit", async function (event) {
                console.log("Submit event fired");
                event.preventDefault();
                errorBox.classList.add("hidden");
                
                const email = emailInput.value.trim();
                const password = passwordInput.value;

                if (!email || !password) {
                    if (errorBox) {
                        errorBox.textContent = "Email/username dan password wajib diisi.";
                        errorBox.classList.remove("hidden");
                    }
                    return;
                }

                // Show loading state
                const originalText = submitButton.textContent;
                submitButton.disabled = true;
                submitButton.innerHTML = '<span class="material-symbols-outlined animate-spin text-sm">sync</span> Signing in...';

                try {
                    const makeBaseCandidates = () => {
                        try {
                            const o = window.location && window.location.origin ? String(window.location.origin) : '';
                            if (!o || o === 'null') return ['http://localhost:3000', 'http://localhost:3001'];
                            const u = new URL(o);
                            const host3000 = u.protocol + '//' + u.hostname + ':3000';
                            const host3001 = u.protocol + '//' + u.hostname + ':3001';
                            return [u.origin, host3000, host3001];
                        } catch (_) {
                            return ['http://localhost:3000', 'http://localhost:3001'];
                        }
                    };

                    const postLogin = async (base) => {
                        const url = base.replace(/\/$/, '') + '/api/login';
                        const response = await fetch(url, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ email, password })
                        });
                        const raw = await response.text();
                        let data;
                        try {
                            data = JSON.parse(raw);
                        } catch (_) {
                            return { ok: false, response, url, raw };
                        }
                        return { ok: true, response, url, data };
                    };

                    const candidates = makeBaseCandidates();
                    let result = null;
                    for (const base of candidates) {
                        try {
                            const r = await postLogin(base);
                            if (r.ok) {
                                result = r;
                                break;
                            }
                            result = r;
                        } catch (e) {
                            result = { ok: false, url: base, error: e };
                        }
                    }

                    if (!result || !result.ok) {
                        throw new Error("API login tidak terbaca (baliknya HTML/Invalid). Pastikan server Node aktif (jalankan: node server.js) dan akses lewat http://localhost:3000/login.html");
                    }

                    const response = result.response;
                    const data = result.data;

                    if (!response.ok) {
                        throw new Error(data.error || 'Login failed');
                    }

                    // Save user info
                    localStorage.setItem('user_id', data.user.id);
                    localStorage.setItem('user_name', data.user.name);
                    localStorage.setItem('user_email', data.user.email);
                    localStorage.setItem('role', data.user.role);
                    localStorage.setItem('login_at', new Date().toISOString());

                    // Redirect
                    const baseUsed = (result.url || '').replace(/\/api\/login$/, '');
                    window.location.href = (baseUsed || window.location.origin) + "/dashboard.html";
                } catch (err) {
                    console.error(err);
                    if (errorBox) {
                        errorBox.textContent = err.message || "Gagal masuk. Periksa kembali email dan password Anda.";
                        errorBox.classList.remove("hidden");
                    }
                    submitButton.disabled = false;
                    submitButton.textContent = originalText;
                }
            });
        }
    });
</script>
</body></html>
